# workflows[no identataiin requried for naming the workflow ]
# should have a name
name: Hello
# on tells what the workflow should run(Give indentation by tab): 
on: workflow_dispatch

# jobs
# jobs tells what the workflow should do, there can be one or more jobs, hence we write the jobs 
# jobs is an object, so it needs indentation
jobs:
# 1 job (give indentation)
  say-hello:
  # creates an ephemeral container with ubuntu running 
    runs-on: ubuntu-latest
    # that an ephermal container will have steps to execute; hence, name those steps and use run has the command 
    steps:
      - name: say hello to everyone
        run: echo "Hello dosto"


