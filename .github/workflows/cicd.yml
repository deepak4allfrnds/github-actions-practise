name: CICD

on:
  workflow_dispatch: 
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: clone the code
        run: echo"Clone the code"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building using Docker"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Run test Cases
        run: echo "Testing the app"

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy application
        run: echo "Deploying the app"
    
    
     
