# What is the goal for this workflow 
# Goal: whenever someone changes  the Python code
# the linter will check if the syntax and format, indentation (Linting is correct or not )

name: Auto Linter
on: 
  push: 
    paths: "*.py"
    

jobs:
  code:
    runs-on: ubuntu-latest
# This step will automatically clone the code of the current branch into the runner 
    steps:
      - name: checkout/clone the code
        uses: actions/checkout@v7
# This step will install the linter tool
      - name: Install Linter
        run: pip install ruff
# This step will  run the linter 
      - name: Check the files for linting
        run: ruff check .


      

 
